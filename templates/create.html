{% extends "base.html" %}
{% block title %}New solution{% endblock %}

{% block content %}
<div style="max-width:480px;">
  <h1 style="margin-bottom:4px;">New solution</h1>
  <p class="page-desc">Will make folder in Solutions/</p>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="POST" style="display:flex; flex-direction:column; gap:18px;">
    <div>
      <label class="label">NAME</label>
      <input class="input" type="text" name="name" placeholder="my_solution"
             autofocus autocomplete="off" value="{{ request.form.get('name', '') }}">
    </div>
    <div>
      <label class="label">DESCRIPTION</label>
      <input class="input" type="text" name="description" placeholder="Description of my solution"
             value="{{ request.form.get('description', '') }}">
    </div>
    <div>
      <label class="label">TEMPLATE</label>
      <select class="input" name="template">
        {% for t in templates %}
        <option value="{{ t.file_name }}"
          {% if request.form.get('template') == t.file_name %}selected{% endif %}>
          {{ t.name }}{% if t.description %} — {{ t.description }}{% endif %}
        </option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="label">README.MD</label>
      <textarea name="readme" id="readme_text_area" rows="10" placeholder="readme.md of solution"></textarea>
    </div>
    <div style="display:flex; gap:10px; margin-top:4px;">
      <button class="btn btn-primary" type="submit">Create</button>
      <a href="/" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
