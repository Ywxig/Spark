{% extends "base.html" %}
{% block title %}ERR 500{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <h1 class="display-1 text-danger">500</h1>
            <h2 class="mb-4">Internal Server Error</h2>
            <img src="https://c.tenor.com/xaNUpBPa3zcAAAAd/tenor.gif" alt="">
            <p class="lead">Oops! Something went wrong on our end.</p>
            <p>We are working to fix the issue. Please try again later.</p>
            <a href="{{ url_for('index') }}" class="btn btn-primary mt-3">Go to Home</a>
        </div>
    </div>
</div>
{% endblock %}
