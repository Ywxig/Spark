<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Solutions{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='side_bar.css') }}">
  <script src="{{ url_for('static', filename='side_bar.js') }}"></script>
</head>
<body>

  <header class="app-header">
    <nav>
      <a onclick="openNav()" class="logo">solution<span>mgr</span></a>
      <div class="nav-links">
        <a href="/">все решения</a>
        <a href="/create">+ создать</a>
      </div>

    </nav>
  </header>

  <div id="side_menu" class="sidebar">
    <a href="javascript:void(0)" onclick="closeNav()" class="logo">solution<span>mgr</span></a>
    <a href="/">Home</a>
    <a href="/docs">Documents</a>
    <a href="https://github.com/Ywxig">
      <img align="left" class="dev" width="50px" height="50px" src="https://upload.wikimedia.org/wikipedia/commons/c/c2/GitHub_Invertocat_Logo.svg">
    </a>
  </div>
  
  <main>
    {% block content %}{% endblock %}
  </main>

</body>
</html>
